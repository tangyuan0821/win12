name: AutoCorrect

on:
  pull_request:
    branches: [main]

jobs:
  autocorrect:
    runs-on: codeberg-tiny
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false
          fetch-depth: 0
      - name: Setup Nix
        uses: nixbuild/nix-quick-install-action@1f095fee853b33114486cfdeae62fa099cda35a9 # v33
      - name: AutoCorrect check
        run: |
          files=$(git diff --diff-filter=AM --name-only ${{ forgejo.event.pull_request.base.sha }})
          if [ -z "$files" ]; then
            echo "No files to check."
            exit 0
          fi
          nix run nixpkgs#autocorrect -- \
          --lint \
          --no-diff-bg-color \
          $files
